<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Lender</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>

<body>

<div class="container">

    <h1>🏦 Smart Lender</h1>

    <h3>Loan Eligibility Prediction System</h3>

    <p class="description">
        Enter the applicant's information below to predict whether the
        loan application is likely to be approved.
    </p>

    <form action="/predict" method="POST">

        <div class="grid">

            <div>
                <label>Gender</label>
                <select name="gender">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div>
                <label>Married</label>
                <select name="married">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div>
                <label>Dependents</label>
                <select name="dependents">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3+</option>
                </select>
            </div>

            <div>
                <label>Education</label>
                <select name="education">
                    <option value="0">Graduate</option>
                    <option value="1">Not Graduate</option>
                </select>
            </div>

            <div>
                <label>Self Employed</label>
                <select name="self_employed">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label>Applicant Income</label>
                <input type="number" name="applicant_income" required>
            </div>

            <div>
                <label>Coapplicant Income</label>
                <input type="number" name="coapplicant_income" required>
            </div>

            <div>
                <label>Loan Amount</label>
                <input type="number" name="loan_amount" required>
            </div>

            <div>
                <label>Loan Amount Term</label>
                <input type="number" name="loan_amount_term" required>
            </div>

            <div>
                <label>Credit History</label>
                <select name="credit_history">
                    <option value="1">Good</option>
                    <option value="0">Bad</option>
                </select>
            </div>

            <div>
                <label>Property Area</label>
                <select name="property_area">
                    <option value="2">Urban</option>
                    <option value="1">Semi Urban</option>
                    <option value="0">Rural</option>
                </select>
            </div>

        </div>

        <button type="submit">Predict Loan Eligibility</button>

    </form>

    <footer>

        Smart Lender • Machine Learning Project using Flask & XGBoost

    </footer>

</div>

</body>
</html>
